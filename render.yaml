services:
  - type: web
    name: herald-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn herald_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: herald-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com